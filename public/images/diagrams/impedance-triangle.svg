<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460">
  <rect width="800" height="460" fill="#F8FAFC"/>
  <rect x="0.5" y="0.5" width="799" height="459" fill="none" stroke="#E2E8F0" stroke-width="1"/>

  <!-- RLC series circuit (top) -->
  <g stroke="#2563EB" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="60" y1="80" x2="110" y2="80"/>
    <path d="M 110,80 l 12,-18 l 22,36 l 22,-36 l 22,36 l 12,-18"/>
    <line x1="200" y1="80" x2="240" y2="80"/>
    <!-- inductor coil -->
    <path d="M 240,80 a 10 10 0 0 1 20 0 a 10 10 0 0 1 20 0 a 10 10 0 0 1 20 0 a 10 10 0 0 1 20 0"/>
    <line x1="320" y1="80" x2="360" y2="80"/>
    <!-- capacitor -->
    <line x1="360" y1="65" x2="360" y2="95"/>
    <line x1="378" y1="65" x2="378" y2="95"/>
    <line x1="378" y1="80" x2="420" y2="80"/>
  </g>
  <text x="155" y="55" font-size="18" fill="#2563EB" text-anchor="middle">R</text>
  <text x="280" y="55" font-size="18" fill="#2563EB" text-anchor="middle">L</text>
  <text x="369" y="55" font-size="18" fill="#2563EB" text-anchor="middle">C</text>

  <!-- impedance right triangle -->
  <g stroke="#0F172A" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="150,400 500,400 500,220"/>
  </g>
  <text x="320" y="425" font-size="24" font-weight="900" fill="#334155" text-anchor="middle">R</text>
  <text x="525" y="315" font-size="24" font-weight="900" fill="#334155" text-anchor="middle">XL − XC</text>
  <text x="290" y="290" font-size="26" font-weight="900" fill="#1D4ED8" text-anchor="middle">Z</text>
  <rect x="480" y="380" width="20" height="20" fill="none" stroke="#64748B" stroke-width="2"/>

  <text x="400" y="440" font-size="16" fill="#64748B" text-anchor="middle">Z = √( R² + (XL − XC)² )</text>
</svg>
