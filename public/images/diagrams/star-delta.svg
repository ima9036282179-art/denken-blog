<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460">
  <rect width="800" height="460" fill="#F8FAFC"/>
  <rect x="0.5" y="0.5" width="799" height="459" fill="none" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Star (Y) connection - left -->
  <text x="190" y="40" font-size="22" font-weight="900" fill="#0F172A" text-anchor="middle">スター結線（Y）</text>
  <g stroke="#2563EB" stroke-width="6" fill="none" stroke-linecap="round">
    <line x1="190" y1="120" x2="190" y2="200"/>
    <line x1="90" y1="270" x2="190" y2="200"/>
    <line x1="290" y1="270" x2="190" y2="200"/>
  </g>
  <circle cx="190" cy="200" r="6" fill="#0F172A"/>
  <circle cx="190" cy="120" r="6" fill="#2563EB"/>
  <circle cx="90" cy="270" r="6" fill="#2563EB"/>
  <circle cx="290" cy="270" r="6" fill="#2563EB"/>
  <text x="140" y="290" font-size="14" fill="#334155">中性点</text>
  <text x="345" y="330" font-size="16" font-weight="700" fill="#334155" text-anchor="middle">V₃ = √3 Vₚ</text>
  <text x="345" y="352" font-size="16" font-weight="700" fill="#334155" text-anchor="middle">I₃ = Iₚ</text>

  <!-- divider -->
  <line x1="420" y1="20" x2="420" y2="440" stroke="#E2E8F0" stroke-width="2"/>

  <!-- Delta connection - right -->
  <text x="610" y="40" font-size="22" font-weight="900" fill="#0F172A" text-anchor="middle">デルタ結線（Δ）</text>
  <g stroke="#2563EB" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="610,120 520,270 700,270"/>
  </g>
  <circle cx="610" cy="120" r="6" fill="#2563EB"/>
  <circle cx="520" cy="270" r="6" fill="#2563EB"/>
  <circle cx="700" cy="270" r="6" fill="#2563EB"/>
  <text x="610" y="330" font-size="16" font-weight="700" fill="#334155" text-anchor="middle">V₃ = Vₚ</text>
  <text x="610" y="352" font-size="16" font-weight="700" fill="#334155" text-anchor="middle">I₃ = √3 Iₚ</text>

  <text x="400" y="430" font-size="15" fill="#64748B" text-anchor="middle">P = √3 × V₃ × I₃ × cosθ（結線方法によらず同じ式）</text>
</svg>
