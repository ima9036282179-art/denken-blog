<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460">
  <rect width="800" height="460" fill="#F8FAFC"/>
  <rect x="0.5" y="0.5" width="799" height="459" fill="none" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Series (left half) -->
  <text x="185" y="45" font-size="22" font-weight="900" fill="#0F172A" text-anchor="middle">直列接続</text>
  <g stroke="#2563EB" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="60" y1="150" x2="120" y2="150"/>
    <path d="M 120,150 l 12,-22 l 24,44 l 24,-44 l 24,44 l 12,-22"/>
    <line x1="216" y1="150" x2="250" y2="150"/>
    <path d="M 250,150 l 12,-22 l 24,44 l 24,-44 l 24,44 l 12,-22"/>
    <line x1="346" y1="150" x2="410" y2="150"/>
  </g>
  <text x="168" y="120" font-size="20" fill="#2563EB" text-anchor="middle">R₁</text>
  <text x="298" y="120" font-size="20" fill="#2563EB" text-anchor="middle">R₂</text>
  <text x="185" y="200" font-size="20" font-weight="700" fill="#334155" text-anchor="middle">R = R₁ + R₂</text>

  <!-- divider -->
  <line x1="420" y1="20" x2="420" y2="440" stroke="#E2E8F0" stroke-width="2"/>

  <!-- Parallel (right half) -->
  <text x="610" y="45" font-size="22" font-weight="900" fill="#0F172A" text-anchor="middle">並列接続</text>
  <g stroke="#2563EB" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="470" y1="150" x2="520" y2="150"/>
    <line x1="520" y1="150" x2="520" y2="110"/>
    <path d="M 520,110 l 12,-16 l 24,32 l 24,-32 l 12,16" transform="translate(0,0)"/>
    <line x1="700" y1="110" x2="742" y2="110"/>
    <line x1="742" y1="110" x2="742" y2="150"/>

    <line x1="520" y1="150" x2="520" y2="200"/>
    <path d="M 520,200 l 12,-16 l 24,32 l 24,-32 l 12,16"/>
    <line x1="700" y1="200" x2="742" y2="200"/>
    <line x1="742" y1="150" x2="742" y2="200"/>

    <line x1="742" y1="150" x2="780" y2="150"/>
  </g>
  <text x="610" y="92" font-size="20" fill="#2563EB" text-anchor="middle">R₁</text>
  <text x="610" y="182" font-size="20" fill="#2563EB" text-anchor="middle">R₂</text>
  <text x="610" y="260" font-size="18" font-weight="700" fill="#334155" text-anchor="middle">1/R = 1/R₁ + 1/R₂</text>
</svg>
