<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460">
  <rect width="800" height="460" fill="#F8FAFC"/>
  <rect x="0.5" y="0.5" width="799" height="459" fill="none" stroke="#E2E8F0" stroke-width="1"/>

  <!-- plates -->
  <rect x="220" y="60" width="20" height="300" rx="4" fill="#1D4ED8"/>
  <rect x="560" y="60" width="20" height="300" rx="4" fill="#0F172A"/>
  <text x="230" y="45" font-size="26" font-weight="900" fill="#1D4ED8" text-anchor="middle">+</text>
  <text x="570" y="45" font-size="26" font-weight="900" fill="#0F172A" text-anchor="middle">−</text>

  <!-- field lines with arrows (E direction, + to -) -->
  <g stroke="#2563EB" stroke-width="4" stroke-linecap="round">
    <line x1="255" y1="120" x2="545" y2="120"/>
    <line x1="255" y1="180" x2="545" y2="180"/>
    <line x1="255" y1="240" x2="545" y2="240"/>
    <line x1="255" y1="300" x2="545" y2="300"/>
  </g>
  <g fill="#2563EB">
    <polygon points="540,112 562,120 540,128"/>
    <polygon points="540,172 562,180 540,188"/>
    <polygon points="540,232 562,240 540,248"/>
    <polygon points="540,292 562,300 540,308"/>
  </g>
  <text x="400" y="155" font-size="24" font-weight="900" fill="#2563EB" text-anchor="middle">E</text>

  <!-- distance d bracket -->
  <line x1="240" y1="400" x2="560" y2="400" stroke="#64748B" stroke-width="2"/>
  <line x1="240" y1="392" x2="240" y2="408" stroke="#64748B" stroke-width="2"/>
  <line x1="560" y1="392" x2="560" y2="408" stroke="#64748B" stroke-width="2"/>
  <text x="400" y="428" font-size="24" font-weight="900" fill="#334155" text-anchor="middle">d</text>

  <!-- voltage V bracket (top) -->
  <line x1="230" y1="30" x2="230" y2="20" stroke="#64748B" stroke-width="2"/>
  <line x1="570" y1="30" x2="570" y2="20" stroke="#64748B" stroke-width="2"/>
  <line x1="230" y1="20" x2="570" y2="20" stroke="#64748B" stroke-width="2"/>
  <text x="400" y="16" font-size="24" font-weight="900" fill="#334155" text-anchor="middle">V</text>

  <!-- D labels near plate surfaces -->
  <text x="230" y="390" font-size="18" font-weight="700" fill="#1D4ED8" text-anchor="middle">D</text>
  <text x="570" y="390" font-size="18" font-weight="700" fill="#0F172A" text-anchor="middle">D</text>

  <text x="400" y="440" font-size="15" fill="#64748B" text-anchor="middle">E = V / d　　D = Q / S（両極板で等しい）</text>
</svg>
