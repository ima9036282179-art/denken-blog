    <text x="-110" y="-25" font-size="40" font-weight="900" fill="#DBEAFE" text-anchor="middle" font-family="Georgia, serif">¥</text>
    <path d="M20,90 L110,20 L200,55 L290,-70" fill="none" stroke="#93C5FD" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M235,-85 L290,-70 L278,-15" fill="none" stroke="#93C5FD" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
